<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOSTI_MACHINE</title>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">
    <style>
        :root {
            --red:    #E8003A;
            --yellow: #F5C800;
            --blue:   #1A6FFF;
            --black:  #0D0D0D;
            --white:  #FFFFFF;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body, html {
            width:100%; height:100%; overflow:hidden;
            background:#000;
            font-family:"Russo One", sans-serif;
        }
        #rawVideo { position:absolute; visibility:hidden; width:1px; height:1px; }
        #thermalCanvas { position:absolute; top:0; left:0; width:100%; height:100%; }
        #vignette {
            position:absolute; inset:0; pointer-events:none; z-index:6;
            background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.6) 100%);
        }
        #scanlines {
            position:absolute; inset:0; pointer-events:none; z-index:7;
            background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.13) 3px, rgba(0,0,0,0.13) 4px);
            opacity:0; transition:opacity 0.3s;
        }
        #scanlines.on { opacity:1; }
        #flashOverlay {
            position:absolute; inset:0; z-index:50;
            background:white; opacity:0; pointer-events:none;
            transition:opacity 0.06s;
        }
        #recIndicator {
            position:absolute; top:52px; left:50%; transform:translateX(-50%);
            z-index:10; display:none; align-items:center; gap:6px;
            background:rgba(10,10,15,0.75); padding:4px 12px;
        }
        #recIndicator.show { display:flex; }
        #recDot { width:8px; height:8px; background:var(--red); animation:blink 0.8s steps(1) infinite; }
        #recTime { font-size:10px; letter-spacing:2px; color:var(--white); }
        #hudBar {
            position:absolute; top:0; left:0; right:0;
            height:42px; z-index:10; pointer-events:none;
            display:flex; align-items:center; justify-content:space-between;
            padding:0 16px;
            background:rgba(10,10,15,0.85);
            border-bottom:3px solid var(--red);
        }
        .hud-left { display:flex; align-items:center; gap:8px; }
        #liveDot { width:8px; height:8px; background:var(--red); animation:blink 1s steps(1) infinite; }
        @keyframes blink { 50%{opacity:0} }
        #paletteName { font-size:10px; letter-spacing:2px; color:var(--yellow); }
        #clockVal { font-size:10px; letter-spacing:2px; color:rgba(255,255,255,0.5); }
        /* HTML watermark — visible on screen only, NOT used for saving */
        #watermark {
            position:absolute; bottom:92px; left:50%;
            transform:translateX(-50%);
            z-index:10; pointer-events:none;
            display:flex; flex-direction:column; align-items:center; gap:3px;
            white-space:nowrap;
        }
        #watermark img { width:85px; filter:drop-shadow(0 2px 6px rgba(0,0,0,0.9)); }
        #watermark .evtname {
            font-size:7px; letter-spacing:4px; color:var(--white);
            text-shadow:0 0 8px var(--yellow), 1px 1px 0 var(--black);
        }
        #controls {
            position:absolute; bottom:0; left:0; right:0;
            height:84px; z-index:10;
            display:flex; align-items:center; justify-content:center;
            background:rgba(10,10,15,0.88);
            border-top:3px solid var(--red);
        }
        .side-btns { display:flex; align-items:center; gap:10px; flex:1; justify-content:center; }
        #centerBtns { display:flex; align-items:center; gap:14px; flex:0 0 auto; }
        .ctrl-btn {
            width:48px; height:48px;
            background:rgba(25,25,35,0.95);
            border:2px solid rgba(255,255,255,0.12);
            display:flex; align-items:center; justify-content:center;
            cursor:pointer;
            transition:background 0.12s, border-color 0.12s;
            -webkit-tap-highlight-color:transparent;
            user-select:none;
            border-radius:4px;
        }
        .ctrl-btn:active { background:rgba(232,0,58,0.25); border-color:var(--red); }
        .ctrl-btn.active { border-color:var(--yellow); background:rgba(245,200,0,0.15); }
        #shutterBtn { width:68px; height:68px; border-radius:50%; border:3px solid rgba(255,255,255,0.25); background:rgba(25,25,35,0.95); }
        #shutterBtn:active { background:rgba(255,255,255,0.15); border-color:var(--white); }
        #videoBtn { width:68px; height:68px; border-radius:50%; border:3px solid rgba(232,0,58,0.45); background:rgba(25,25,35,0.95); }
        #videoBtn.recording { border-color:var(--red); background:rgba(232,0,58,0.2); animation:recPulse 1s ease-in-out infinite; }
        @keyframes recPulse { 0%,100%{box-shadow:0 0 0 0 rgba(232,0,58,0.4)} 50%{box-shadow:0 0 0 8px rgba(232,0,58,0)} }
        #flashToggleBtn.flash-on { border-color:var(--yellow); background:rgba(245,200,0,0.18); }

        /* SPLASH */
        #permScreen {
            position:absolute; inset:0; z-index:100;
            background:#05010F;
            display:flex; flex-direction:column;
            align-items:center; justify-content:center; gap:24px;
            overflow:hidden;
        }
        #permScreen::before {
            content:"";
            position:absolute; inset:0;
            background-image:
                linear-gradient(rgba(232,0,58,0.15) 1px, transparent 1px),
                linear-gradient(90deg, rgba(232,0,58,0.15) 1px, transparent 1px);
            background-size: 32px 32px;
            mask-image: radial-gradient(ellipse at 50% 120%, black 30%, transparent 70%);
            -webkit-mask-image: radial-gradient(ellipse at 50% 120%, black 30%, transparent 70%);
        }
        #permScreen::after {
            content:"";
            position:absolute;
            width:280px; height:280px; border-radius:50%;
            background: radial-gradient(circle, rgba(232,0,58,0.25) 0%, rgba(245,200,0,0.1) 40%, transparent 70%);
            top:50%; left:50%;
            transform:translate(-50%,-62%);
            animation:orbPulse 3s ease-in-out infinite;
        }
        @keyframes orbPulse { 0%,100%{opacity:0.7;transform:translate(-50%,-62%) scale(1)} 50%{opacity:1;transform:translate(-50%,-62%) scale(1.08)} }
        .splash-logo { position:relative; z-index:2; }
        .splash-logo img {
            width:150px;
            filter: drop-shadow(0 0 12px rgba(232,0,58,0.9)) drop-shadow(0 0 30px rgba(245,200,0,0.5)) drop-shadow(0 0 60px rgba(232,0,58,0.3));
            animation:float 3s ease-in-out infinite;
        }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
        .splash-title {
            position:relative; z-index:2;
            font-size:36px; line-height:1.0; text-align:center; color:var(--white);
            text-shadow: 0 0 10px rgba(232,0,58,1), 0 0 30px rgba(232,0,58,0.7), 0 0 60px rgba(245,200,0,0.4);
            letter-spacing:4px;
        }
        .splash-line {
            position:relative; z-index:2;
            width:200px; height:2px;
            background:linear-gradient(to right, transparent, var(--red), var(--yellow), var(--red), transparent);
            box-shadow:0 0 10px var(--red);
        }
        .splash-sub {
            position:relative; z-index:2;
            font-size:8px; letter-spacing:2px;
            color:rgba(255,255,255,0.45);
            text-align:center; line-height:2;
        }
        #startBtn {
            position:relative; z-index:2;
            padding:16px 42px; background:transparent;
            border:2px solid var(--red); color:var(--white);
            font-family:"Russo One",sans-serif; font-size:13px; letter-spacing:4px;
            cursor:pointer;
            box-shadow: 0 0 12px rgba(232,0,58,0.6), inset 0 0 12px rgba(232,0,58,0.1);
            transition:all 0.15s; -webkit-tap-highlight-color:transparent;
        }
        #startBtn:active { background:rgba(232,0,58,0.2); box-shadow:0 0 24px rgba(232,0,58,0.9), inset 0 0 20px rgba(232,0,58,0.2); }
        #startBtn:disabled { opacity:0.45; cursor:wait; }
        .splash-beam {
            position:absolute; z-index:1; left:0; right:0; height:2px;
            background:linear-gradient(to right, transparent, rgba(232,0,58,0.4), transparent);
            animation:beam 4s linear infinite;
        }
        @keyframes beam { 0%{top:-2px} 100%{top:100%} }
        #debugPanel {
            position:absolute; bottom:0; left:0; right:0; z-index:200;
            background:rgba(0,0,0,0.96); border-top:3px solid var(--yellow);
            padding:10px 14px; display:none; flex-direction:column; gap:6px; max-height:50%;
        }
        #debugPanel.show { display:flex; }
        #debugTitle { font-size:8px; letter-spacing:2px; color:var(--yellow); }
        #debugLog { font-family:monospace; font-size:11px; color:#aaffaa; line-height:1.8; overflow-y:auto; max-height:150px; }
        #debugLog .err  { color:#ff6666; }
        #debugLog .warn { color:#ffcc00; }
        #debugClose { font-family:monospace; font-size:10px; color:rgba(255,255,255,0.4); cursor:pointer; align-self:flex-end; }
    </style>
</head>
<body>

<video id="rawVideo" autoplay playsinline muted></video>
<canvas id="thermalCanvas"></canvas>
<div id="vignette"></div>
<div id="scanlines"></div>
<div id="flashOverlay"></div>

<div id="hudBar">
    <div class="hud-left">
        <div id="liveDot"></div>
        <span id="paletteName">HEATMAP</span>
    </div>
    <span id="clockVal">00:00:00</span>
</div>

<div id="recIndicator">
    <div id="recDot"></div>
    <span id="recTime">00:00</span>
</div>

const WM_LABEL = "DOSTI_MACHINE";

// draws watermark directly onto any canvas context — used for save
function drawWatermark(targetCtx, cw, ch) {
    const CONTROLS_H = 84;  // height of bottom bar — keep watermark above it
    const wmW  = cw * 0.22; // logo ~22% of canvas width
    const wmH  = wmW;       // square logo
    const x    = (cw - wmW) / 2;
    const y    = ch - CONTROLS_H - wmH - 28;

    // semi-transparent dark backing so it reads on any palette
    targetCtx.save();
    targetCtx.globalAlpha = 0.0; // no backing box, just the logo + text
    targetCtx.restore();

    // logo
    targetCtx.save();
    targetCtx.globalAlpha = 0.88;
    if (wmImage.complete && wmImage.naturalWidth > 0) {
        targetCtx.drawImage(wmImage, x, y, wmW, wmH);
    }
    targetCtx.restore();

    // event name text
    targetCtx.save();
    const fontSize = Math.max(10, Math.round(cw * 0.022));
    targetCtx.font          = `900 ${fontSize}px "Russo One", sans-serif`;
    targetCtx.textAlign     = "center";
    targetCtx.letterSpacing = "4px";
    // glow
    targetCtx.shadowColor   = "#F5C800";
    targetCtx.shadowBlur    = 8;
    targetCtx.fillStyle     = "#FFFFFF";
    targetCtx.globalAlpha   = 0.92;
    targetCtx.fillText(WM_LABEL, cw / 2, y + wmH + fontSize + 4);
    targetCtx.restore();
}

function buildLUT(stops) {
    const lut = new Uint8ClampedArray(256*3);
    for (let i=0; i<256; i++) {
        let lo=stops[0], hi=stops[stops.length-1];
        for (let s=0; s<stops.length-1; s++) {
            if (i>=stops[s][0] && i<=stops[s+1][0]) { lo=stops[s]; hi=stops[s+1]; break; }
        }
        const t = lo[0]===hi[0] ? 0 : (i-lo[0])/(hi[0]-lo[0]);
        const l = (a,b) => Math.round(a+(b-a)*t);
        lut[i*3]=l(lo[1][0],hi[1][0]); lut[i*3+1]=l(lo[1][1],hi[1][1]); lut[i*3+2]=l(lo[1][2],hi[1][2]);
    }
    return lut;
}
const LUTS = PALETTES.map(p => buildLUT(p.stops));

function applyPalette(idx) {
    currentPalette = idx;
    document.getElementById("paletteName").textContent = PALETTES[idx].name;
}
applyPalette(0);

// ── CANVAS ────────────────────────────────────────────────────────────────
const video     = document.getElementById("rawVideo");
const canvas    = document.getElementById("thermalCanvas");
const ctx       = canvas.getContext("2d", { willReadFrequently:true });
const offCanvas = document.createElement("canvas");
const offCtx    = offCanvas.getContext("2d", { willReadFrequently:true });

function resizeCanvas() { canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

// ── DEBUG ─────────────────────────────────────────────────────────────────
function dbgErr(msg, cls) {
    const panel=document.getElementById("debugPanel");
    const log=document.getElementById("debugLog");
    panel.classList.add("show");
    const line=document.createElement("div");
    line.className=cls||"err";
    line.textContent="> "+msg;
    log.appendChild(line);
    log.scrollTop=log.scrollHeight;
}

// ── CAMERA ────────────────────────────────────────────────────────────────
function startCamera(front) {
    if (isRecording) stopRecording();
    if (stream) { stream.getTracks().forEach(t=>t.stop()); stream=null; }
    if (location.protocol!=="https:" && location.hostname!=="localhost" && location.hostname!=="127.0.0.1") {
        dbgErr("Not HTTPS — host on GitHub Pages."); return;
    }
    if (!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia) {
        dbgErr("Camera API not supported."); return;
    }
    navigator.mediaDevices.getUserMedia({
        video:{ facingMode:front?"user":"environment", width:{ideal:1280}, height:{ideal:720} },
        audio:true
    }).then(function(s) {
        stream=s; video.srcObject=s;
        video.addEventListener("loadedmetadata", function() {
            video.play().then(function() {
                document.getElementById("permScreen").style.display="none";
                requestAnimationFrame(renderFrame);
            }).catch(e=>dbgErr("play() failed: "+e.name));
        }, {once:true});
    }).catch(function(err) {
        dbgErr("Camera error: "+err.name+" — "+err.message);
        const btn=document.getElementById("startBtn");
        if (btn) { btn.innerHTML="&#9654; ACTIVATE"; btn.disabled=false; }
        if (err.name==="NotAllowedError") dbgErr("Settings > Safari > Camera > Allow","warn");
    });
}

document.getElementById("startBtn").addEventListener("click", function() {
    this.textContent="LOADING..."; this.disabled=true;
    startCamera(useFrontCamera);
});

document.getElementById("flipBtn").addEventListener("click", function() {
    useFrontCamera=!useFrontCamera; startCamera(useFrontCamera);
});

document.getElementById("paletteBtn").addEventListener("click", function() {
    applyPalette((currentPalette+1)%PALETTES.length);
});

document.getElementById("scanBtn").addEventListener("click", function() {
    this.classList.toggle("active");
    document.getElementById("scanlines").classList.toggle("on");
});

document.getElementById("flashToggleBtn").addEventListener("click", function() {
    flashOn=!flashOn;
    this.classList.toggle("flash-on", flashOn);
    if (stream) {
        const track=stream.getVideoTracks()[0];
        if (track&&track.getCapabilities&&track.getCapabilities().torch) {
            track.applyConstraints({advanced:[{torch:flashOn}]}).catch(()=>{});
        }
    }
});

// ── PHOTO — watermark baked into saved image ──────────────────────────────
function doCapture() {
    // white flash
    const overlay=document.getElementById("flashOverlay");
    overlay.style.opacity="1";
    setTimeout(()=>{ overlay.style.opacity="0"; },130);

    // build a save canvas = current thermal canvas + watermark drawn on top
    const saveCanvas = document.createElement("canvas");
    saveCanvas.width  = canvas.width;
    saveCanvas.height = canvas.height;
    const sCtx = saveCanvas.getContext("2d");

    // 1. copy current thermal frame
    sCtx.drawImage(canvas, 0, 0);

    // 2. paint watermark onto the save canvas
    drawWatermark(sCtx, saveCanvas.width, saveCanvas.height);

    // 3. download
    const link=document.createElement("a");
    link.download="DOSTI_MACHINE.jpg";
    link.href=saveCanvas.toDataURL("image/jpeg", 0.94);
    link.click();
}
document.getElementById("shutterBtn").addEventListener("click", doCapture);

// ── VIDEO — watermark baked into recorded stream ──────────────────────────
function formatTime(s) { return String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0"); }

// separate canvas for video output — thermal + watermark composited every frame
const recCanvas = document.createElement("canvas");
const recCtx    = recCanvas.getContext("2d");

function stopRecording() {
    if (!mediaRecorder) return;
    mediaRecorder.stop();
    isRecording=false;
    clearInterval(recInterval);
    recSeconds=0;
    document.getElementById("recIndicator").classList.remove("show");
    document.getElementById("videoBtn").classList.remove("recording");
    document.getElementById("videoIcon").innerHTML=`
        <rect x="2" y="8" width="18" height="16" rx="2" fill="white"/>
        <circle cx="11" cy="16" r="5" fill="#111" stroke="white" stroke-width="1"/>
        <circle cx="11" cy="16" r="2.5" fill="#333"/>
        <polygon points="22,11 30,8 30,24 22,21" fill="white"/>
    `;
}

document.getElementById("videoBtn").addEventListener("click", function() {
    if (!stream) return;
    if (isRecording) { stopRecording(); return; }

    // size rec canvas to match display
    recCanvas.width  = canvas.width;
    recCanvas.height = canvas.height;

    // composite loop: copy thermal canvas → draw watermark → repeat at 30fps
    let compositeRunning = true;
    function compositeFrame() {
        if (!compositeRunning) return;
        recCtx.drawImage(canvas, 0, 0);
        drawWatermark(recCtx, recCanvas.width, recCanvas.height);
        requestAnimationFrame(compositeFrame);
    }
    compositeFrame();

    const recStream = recCanvas.captureStream(30);
    stream.getAudioTracks().forEach(t => recStream.addTrack(t));

    const mimeType = MediaRecorder.isTypeSupported("video/webm;codecs=vp9")
        ? "video/webm;codecs=vp9"
        : MediaRecorder.isTypeSupported("video/webm") ? "video/webm" : "video/mp4";

    try { mediaRecorder=new MediaRecorder(recStream,{mimeType}); }
    catch(e) { mediaRecorder=new MediaRecorder(recStream); }

    recChunks=[];
    mediaRecorder.ondataavailable=e=>{ if(e.data.size>0) recChunks.push(e.data); };
    mediaRecorder.onstop=()=>{
        compositeRunning=false;
        const blob=new Blob(recChunks,{type:mimeType});
        const url=URL.createObjectURL(blob);
        const link=document.createElement("a");
        link.download="DOSTI_MACHINE_video."+(mimeType.includes("mp4")?"mp4":"webm");
        link.href=url; link.click();
        URL.revokeObjectURL(url);
    };

    mediaRecorder.start();
    isRecording=true;
    document.getElementById("videoBtn").classList.add("recording");
    document.getElementById("recIndicator").classList.add("show");
    document.getElementById("videoIcon").innerHTML=`<rect x="8" y="8" width="16" height="16" rx="2" fill="#E8003A"/>`;
    recSeconds=0;
    document.getElementById("recTime").textContent=formatTime(0);
    recInterval=setInterval(()=>{ recSeconds++; document.getElementById("recTime").textContent=formatTime(recSeconds); },1000);
});

// ── RENDER LOOP ───────────────────────────────────────────────────────────
function renderFrame() {
    if (video.readyState<2) { requestAnimationFrame(renderFrame); return; }
    const vw=video.videoWidth, vh=video.videoHeight;
    if (!vw||!vh) { requestAnimationFrame(renderFrame); return; }

    const lowW=Math.ceil(vw/PIXEL_BLOCK), lowH=Math.ceil(vh/PIXEL_BLOCK);
    offCanvas.width=lowW; offCanvas.height=lowH;

    if (useFrontCamera) { offCtx.save(); offCtx.translate(lowW,0); offCtx.scale(-1,1); }
    offCtx.drawImage(video,0,0,lowW,lowH);
    if (useFrontCamera) offCtx.restore();

    const imgData=offCtx.getImageData(0,0,lowW,lowH);
    const data=imgData.data;
    const lut=LUTS[currentPalette];

    for (let i=0;i<data.length;i+=4) {
        let lum=0.299*data[i]+0.587*data[i+1]+0.114*data[i+2];
        lum=128+(lum-128)*CONTRAST;
        lum=Math.max(0,Math.min(255,lum));
        const idx=Math.round(lum)*3;
        data[i]=lut[idx]; data[i+1]=lut[idx+1]; data[i+2]=lut[idx+2];
    }
    offCtx.putImageData(imgData,0,0);

    ctx.imageSmoothingEnabled=true;
    ctx.imageSmoothingQuality="high";
    ctx.drawImage(offCanvas,0,0,canvas.width,canvas.height);

    requestAnimationFrame(renderFrame);
}

// ── CLOCK ─────────────────────────────────────────────────────────────────
function tick() {
    const n=new Date();
    document.getElementById("clockVal").textContent=
        [n.getHours(),n.getMinutes(),n.getSeconds()].map(v=>String(v).padStart(2,"0")).join(":");
}
setInterval(tick,1000); tick();
</script>
