<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOSTI_MACHINE</title>
    <link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Russo+One&display=swap" rel="stylesheet">
    <style>
        :root {
            --red:    #E8003A;
            --yellow: #F5C800;
            --blue:   #1A6FFF;
            --black:  #0D0D0D;
            --cream:  #F0E8D0;
            --white:  #FFFFFF;
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body, html {
            width:100%; height:100%;
            overflow:hidden;
            background: var(--yellow);
            font-family: "Russo One", "Boogaloo", sans-serif;
            image-rendering: pixelated;
        }

        /* ── CAMERA + CANVAS ── */
        #rawVideo { position:absolute; visibility:hidden; width:1px; height:1px; }
        #thermalCanvas {
            position:absolute; top:0; left:0; width:100%; height:100%;
            image-rendering: pixelated;
        }

        /* scanlines over camera */
        #scanlines {
            position:absolute; inset:0; pointer-events:none; z-index:5;
            background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.1) 3px, rgba(0,0,0,0.1) 4px);
        }

        /* thick comic border around camera view */
        #frame {
            position:absolute; inset:0; pointer-events:none; z-index:8;
            border: 5px solid var(--black);
            box-shadow: inset 0 0 0 3px var(--red);
        }

        /* ── HUD BAR ── */
        #hudBar {
            position:absolute; top:0; left:0; right:0;
            height:38px; z-index:10; pointer-events:none;
            display:flex; align-items:center; justify-content:space-between;
            padding:0 14px;
            background: var(--red);
            border-bottom: 4px solid var(--black);
        }
        .hud-left { display:flex; align-items:center; gap:8px; }
        #liveDot {
            width:8px; height:8px;
            background: var(--yellow);
            border: 2px solid var(--black);
            animation: blink 1s steps(1) infinite;
        }
        @keyframes blink { 50%{ opacity:0; } }
        .hud-label {
            font-family:"Russo One",sans-serif;
            font-size:11px; letter-spacing:2px;
            color: var(--yellow);
            -webkit-text-stroke: 0.5px var(--black);
        }
        #clockVal {
            font-family:"Russo One",sans-serif;
            font-size:11px; letter-spacing:2px;
            color: var(--white);
            -webkit-text-stroke: 0.5px var(--black);
        }

        /* ── TEMP SCALE ── */
        #tempScale {
            position:absolute; right:14px; top:50%; transform:translateY(-50%);
            width:10px; height:140px; z-index:10;
            background: linear-gradient(to bottom,
                #fff 0%, #ff0033 15%, #ff6600 30%,
                #ffcc00 45%, #00ddff 65%, #0033ff 80%, #1a0040 100%
            );
            border: 2px solid var(--black);
        }
        #tempScale::before { content:"HOT"; position:absolute; top:-16px; left:50%; transform:translateX(-50%); font-family:"Russo One",sans-serif; font-size:6px; color:var(--red); -webkit-text-stroke:0.3px var(--black); }
        #tempScale::after  { content:"COLD"; position:absolute; bottom:-16px; left:50%; transform:translateX(-50%); font-family:"Russo One",sans-serif; font-size:6px; color:var(--blue); -webkit-text-stroke:0.3px var(--black); }

        /* ── CTA ── */
        #cta {
            position:absolute; bottom:82px; left:0; right:0;
            text-align:center; z-index:10; pointer-events:none;
            font-family:"Russo One",sans-serif;
            font-size:9px; letter-spacing:3px;
            color: var(--yellow);
            -webkit-text-stroke: 1px var(--black);
            paint-order: stroke fill;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse { 0%,100%{opacity:0.7} 50%{opacity:1} }

        /* ── WATERMARK ── */
        #watermark {
            position:absolute; bottom:10px; left:50%;
            transform:translateX(-50%);
            z-index:10; pointer-events:none;
            display:flex; flex-direction:column; align-items:center; gap:4px;
        }
        #watermark img { width:100px; filter: drop-shadow(2px 2px 0 var(--black)); }
        #watermark .evtname {
            font-family:"Russo One",sans-serif;
            font-size:9px; letter-spacing:4px;
            color: var(--white);
            -webkit-text-stroke: 1.5px var(--black);
            paint-order: stroke fill;
        }

        /* ══════════════════════════════════════
           SPLASH SCREEN
        ══════════════════════════════════════ */
        #permScreen {
            position:absolute; inset:0; z-index:100;
            background: var(--yellow);
            display:flex; flex-direction:column;
            align-items:center; justify-content:center;
            gap:20px;
            /* grain texture */
            background-image:
                url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
        }

        /* thick top red bar like poster */
        .splash-topbar {
            position:absolute; top:0; left:0; right:0;
            height:14px; background:var(--red);
            border-bottom:4px solid var(--black);
        }
        .splash-botbar {
            position:absolute; bottom:0; left:0; right:0;
            height:14px; background:var(--blue);
            border-top:4px solid var(--black);
        }

        /* logo */
        .splash-logo img {
            width:140px;
            filter: drop-shadow(3px 3px 0 var(--black));
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

        /* big comic title */
        .splash-title {
            font-family:"Russo One",sans-serif;
            font-size:32px;
            line-height:1.05;
            text-align:center;
            color: var(--red);
            -webkit-text-stroke: 3px var(--black);
            paint-order: stroke fill;
            /* drop shadow like poster lettering */
            text-shadow:
                4px 4px 0 var(--black),
                5px 5px 0 var(--black);
            letter-spacing:2px;
        }

        /* sub label in blue like "LINEUP" on poster */
        .splash-sub {
            font-family:"Russo One",sans-serif;
            font-size:8px; letter-spacing:3px;
            color: var(--blue);
            -webkit-text-stroke: 0.8px var(--black);
            paint-order: stroke fill;
            text-align:center;
            line-height:2;
            text-shadow: 2px 2px 0 var(--black);
        }

        /* Pokéball-style activate button */
        #startBtn {
            position:relative;
            padding:16px 36px;
            background: var(--red);
            border: 4px solid var(--black);
            color: var(--white);
            font-family:"Russo One",sans-serif;
            font-size:14px; letter-spacing:3px;
            cursor:pointer;
            /* comic 3d offset shadow */
            box-shadow: 5px 5px 0 var(--black);
            -webkit-text-stroke: 0.5px var(--black);
            transition: transform 0.08s, box-shadow 0.08s;
        }
        #startBtn:active {
            transform: translate(4px,4px);
            box-shadow: 1px 1px 0 var(--black);
        }
        #startBtn:disabled { opacity:0.55; cursor:wait; }

        /* debug panel */
        #debugPanel {
            position:absolute; bottom:0; left:0; right:0; z-index:200;
            background:rgba(0,0,0,0.95); border-top:3px solid var(--yellow);
            padding:10px 12px; display:none; flex-direction:column; gap:6px;
            max-height:50%;
        }
        #debugPanel.show { display:flex; }
        #debugTitle { font-family:"Russo One",sans-serif; font-size:8px; letter-spacing:2px; color:var(--yellow); }
        #debugLog { font-family:monospace; font-size:11px; color:#aaffaa; line-height:1.8; overflow-y:auto; max-height:140px; }
        #debugLog .err  { color:#ff6666; }
        #debugLog .warn { color:#ffcc00; }
        #debugClose { font-family:monospace; font-size:10px; color:rgba(255,255,255,0.4); cursor:pointer; align-self:flex-end; }
    </style>
</head>
<body>

<video id="rawVideo" autoplay playsinline muted></video>
<canvas id="thermalCanvas"></canvas>
<div id="scanlines"></div>
<div id="frame"></div>

<div id="hudBar">
    <div class="hud-left">
        <div id="liveDot"></div>
        <span class="hud-label">THERMAL IR</span>
    </div>
    <span id="clockVal">00:00:00</span>
</div>

<div id="tempScale"></div>
<div id="cta">[ SCREENSHOT TO SHARE ]</div>

function dbg(msg, type) {
    const panel = document.getElementById("debugPanel");
    const log   = document.getElementById("debugLog");
    panel.classList.add("show");
    const line = document.createElement("div");
    line.className = type || "";
    line.textContent = "> " + msg;
    log.appendChild(line);
    log.scrollTop = log.scrollHeight;
    console.log("[DBG]", msg);
}

const LUT_STOPS = [
    [  0, [  8,   0,  30]],
    [ 30, [ 20,   0,  80]],
    [ 60, [  0,  20, 200]],
    [ 90, [  0, 130, 230]],
    [118, [  0, 210, 160]],
    [148, [245, 200,   0]],
    [182, [232,   0,  58]],
    [218, [255,  80, 120]],
    [255, [255, 255, 255]],
];
function buildLUT() {
    const lut = new Uint8ClampedArray(256 * 3);
    for (let i = 0; i < 256; i++) {
        let lo = LUT_STOPS[0], hi = LUT_STOPS[LUT_STOPS.length-1];
        for (let s = 0; s < LUT_STOPS.length-1; s++) {
            if (i >= LUT_STOPS[s][0] && i <= LUT_STOPS[s+1][0]) { lo=LUT_STOPS[s]; hi=LUT_STOPS[s+1]; break; }
        }
        const t = lo[0]===hi[0] ? 0 : (i-lo[0])/(hi[0]-lo[0]);
        const lerp = (a,b) => Math.round(a+(b-a)*t);
        lut[i*3]   = lerp(lo[1][0],hi[1][0]);
        lut[i*3+1] = lerp(lo[1][1],hi[1][1]);
        lut[i*3+2] = lerp(lo[1][2],hi[1][2]);
    }
    return lut;
}
const LUT = buildLUT();

    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        dbg("getUserMedia NOT SUPPORTED on this browser", "err");
        return;
    }

    dbg("Requesting camera access...");
    const btn = document.getElementById("startBtn");
    btn.textContent = "LOADING...";
    btn.disabled = true;

    navigator.mediaDevices.getUserMedia({
        video: {
            facingMode: USE_FRONT_CAMERA ? "user" : "environment",
            width:  { ideal: 640 },
            height: { ideal: 480 }
        },
        audio: false
    })
    .then(function(stream) {
        dbg("Stream OK — tracks: " + stream.getVideoTracks().length);
        video.srcObject = stream;
        video.addEventListener("loadedmetadata", function() {
            dbg("Metadata loaded, calling play()...");
            video.play().then(function() {
                dbg("Playing! Hiding splash.");
                document.getElementById("permScreen").style.display = "none";
                requestAnimationFrame(renderFrame);
            }).catch(function(e) {
                dbg("play() error: " + e.name + " / " + e.message, "err");
            });
        }, { once: true });
    })
    .catch(function(err) {
        dbg("getUserMedia FAILED: " + err.name, "err");
        dbg("Detail: " + err.message, "err");
        btn.innerHTML = "&#9654; ACTIVATE";
        btn.disabled = false;
        if (err.name === "NotAllowedError")   dbg("Go to Settings > Safari > Camera > Allow", "warn");
        if (err.name === "NotFoundError")     dbg("No camera found on device", "warn");
        if (err.name === "NotSupportedError") dbg("Needs HTTPS to work", "warn");
        if (err.name === "SecurityError")     dbg("Needs HTTPS to work", "warn");
    });
});

function renderFrame() {
    if (video.readyState < 2) { requestAnimationFrame(renderFrame); return; }
    const vw=video.videoWidth, vh=video.videoHeight;
    if (!vw||!vh) { requestAnimationFrame(renderFrame); return; }
    const lowW=Math.ceil(vw/PIXEL_BLOCK), lowH=Math.ceil(vh/PIXEL_BLOCK);
    offCanvas.width=lowW; offCanvas.height=lowH;
    if (USE_FRONT_CAMERA) { offCtx.save(); offCtx.translate(lowW,0); offCtx.scale(-1,1); }
    offCtx.drawImage(video,0,0,lowW,lowH);
    if (USE_FRONT_CAMERA) offCtx.restore();
    const imgData=offCtx.getImageData(0,0,lowW,lowH);
    const data=imgData.data;
    for (let i=0;i<data.length;i+=4) {
        let lum=0.299*data[i]+0.587*data[i+1]+0.114*data[i+2];
        lum=128+(lum-128)*CONTRAST_BOOST;
        lum=Math.max(0,Math.min(255,lum));
        const idx=Math.round(lum)*3;
        data[i]=LUT[idx]; data[i+1]=LUT[idx+1]; data[i+2]=LUT[idx+2];
    }
    offCtx.putImageData(imgData,0,0);
    ctx.imageSmoothingEnabled=false;
    ctx.drawImage(offCanvas,0,0,canvas.width,canvas.height);
    requestAnimationFrame(renderFrame);
}

function tick() {
    const n=new Date();
    document.getElementById("clockVal").textContent=
        [n.getHours(),n.getMinutes(),n.getSeconds()].map(v=>String(v).padStart(2,"0")).join(":");
}
setInterval(tick,1000); tick();
</script>
