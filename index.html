<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOSTI_MACHINE</title>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">
    <style>
        :root {
            --red:    #E8003A;
            --yellow: #F5C800;
            --blue:   #1A6FFF;
            --black:  #0D0D0D;
            --dark:   #111827;
            --cream:  #F0E8D0;
            --white:  #FFFFFF;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body, html {
            width:100%; height:100%; overflow:hidden;
            background:#000;
            font-family:"Russo One", sans-serif;
        }

        /* CAMERA */
        #rawVideo { position:absolute; visibility:hidden; width:1px; height:1px; }
        #thermalCanvas {
            position:absolute; top:0; left:0; width:100%; height:100%;
            /* smooth — NO pixelated rendering */
        }

        /* DARK VIGNETTE frame */
        #vignette {
            position:absolute; inset:0; pointer-events:none; z-index:6;
            background: radial-gradient(ellipse at center,
                transparent 55%,
                rgba(0,0,0,0.55) 100%
            );
        }

        /* ── HUD BAR top ── */
        #hudBar {
            position:absolute; top:0; left:0; right:0;
            height:40px; z-index:10; pointer-events:none;
            display:flex; align-items:center; justify-content:space-between;
            padding:0 16px;
            background: rgba(13,13,13,0.82);
            border-bottom: 3px solid var(--red);
        }
        .hud-left { display:flex; align-items:center; gap:8px; }
        #liveDot {
            width:8px; height:8px; border-radius:0;
            background:var(--red);
            animation: blink 1s steps(1) infinite;
        }
        @keyframes blink { 50%{ opacity:0; } }
        .hud-label {
            font-size:11px; letter-spacing:2px; color:var(--red);
        }
        #clockVal {
            font-size:11px; letter-spacing:2px; color:var(--yellow);
        }

        /* ── CONTROLS bottom bar ── */
        #controls {
            position:absolute; bottom:0; left:0; right:0;
            height:80px; z-index:10;
            display:flex; align-items:center; justify-content:space-around;
            padding:0 30px;
            background: rgba(13,13,13,0.82);
            border-top: 3px solid var(--red);
        }

        /* WATERMARK — sits above controls bar */
        #watermark {
            position:absolute; bottom:88px; left:50%;
            transform:translateX(-50%);
            z-index:10; pointer-events:none;
            display:flex; flex-direction:column; align-items:center; gap:3px;
            white-space:nowrap;
        }
        #watermark img {
            width:90px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.8));
        }
        #watermark .evtname {
            font-size:8px; letter-spacing:4px;
            color:var(--white);
            text-shadow: 0 0 8px var(--yellow), 1px 1px 0 var(--black);
        }

        /* CTA */
        #cta {
            position:absolute; bottom:90px; left:0; right:0;
            text-align:center; z-index:9; pointer-events:none;
            font-size:7px; letter-spacing:3px;
            color:rgba(245,200,0,0.0); /* hidden — watermark takes this space */
        }

        /* control buttons */
        .ctrl-btn {
            width:52px; height:52px;
            background:rgba(30,30,40,0.9);
            border:2px solid rgba(255,255,255,0.15);
            border-radius:0;
            color:var(--white);
            font-size:22px;
            display:flex; align-items:center; justify-content:center;
            cursor:pointer;
            transition: background 0.15s, border-color 0.15s;
            -webkit-tap-highlight-color: transparent;
            user-select:none;
        }
        .ctrl-btn:active { background:rgba(232,0,58,0.3); border-color:var(--red); }

        /* flash overlay */
        #flashOverlay {
            position:absolute; inset:0; z-index:50;
            background:white; opacity:0; pointer-events:none;
            transition: opacity 0.05s;
        }

        /* screenshot label */
        #snapLabel {
            position:absolute; top:50%; left:50%;
            transform:translate(-50%,-50%);
            z-index:51; pointer-events:none;
            font-size:12px; letter-spacing:3px; color:var(--black);
            opacity:0; transition:opacity 0.1s;
        }

        /* TEMP SCALE */
        #tempScale {
            position:absolute; right:16px; top:50%; transform:translateY(-50%);
            width:8px; height:130px; z-index:10;
            background: linear-gradient(to bottom,
                #fff 0%, #ff0033 15%, #ff6600 30%,
                #ffcc00 45%, #00ddff 65%, #0033ff 80%, #200050 100%
            );
            border:1px solid rgba(255,255,255,0.2);
            box-shadow: 0 0 8px rgba(0,100,255,0.3);
        }
        #tempScale::before { content:"HOT"; position:absolute; top:-16px; left:50%; transform:translateX(-50%); font-size:6px; color:var(--red); letter-spacing:1px; }
        #tempScale::after  { content:"COLD"; position:absolute; bottom:-16px; left:50%; transform:translateX(-50%); font-size:6px; color:#6699ff; letter-spacing:1px; }

        /* ══ SPLASH ══ */
        #permScreen {
            position:absolute; inset:0; z-index:100;
            background:var(--yellow);
            display:flex; flex-direction:column;
            align-items:center; justify-content:center; gap:22px;
        }
        .splash-topbar { position:absolute; top:0; left:0; right:0; height:12px; background:var(--red); border-bottom:4px solid var(--black); }
        .splash-botbar { position:absolute; bottom:0; left:0; right:0; height:12px; background:var(--blue); border-top:4px solid var(--black); }

        .splash-logo img {
            width:140px;
            filter:drop-shadow(3px 3px 0 var(--black));
            animation:float 3s ease-in-out infinite;
        }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }

        .splash-title {
            font-size:34px; line-height:1.05; text-align:center;
            color:var(--red);
            -webkit-text-stroke:3px var(--black);
            paint-order:stroke fill;
            text-shadow:5px 5px 0 var(--black);
            letter-spacing:2px;
        }
        .splash-sub {
            font-size:7px; letter-spacing:3px;
            color:var(--blue);
            -webkit-text-stroke:0.5px var(--black);
            text-align:center; line-height:2.2;
            text-shadow:1px 1px 0 var(--black);
        }
        #startBtn {
            padding:16px 38px;
            background:var(--red); border:4px solid var(--black);
            color:var(--white); font-family:"Russo One",sans-serif;
            font-size:15px; letter-spacing:3px; cursor:pointer;
            box-shadow:5px 5px 0 var(--black);
            transition:transform 0.08s, box-shadow 0.08s;
            -webkit-tap-highlight-color:transparent;
        }
        #startBtn:active { transform:translate(4px,4px); box-shadow:1px 1px 0 var(--black); }
        #startBtn:disabled { opacity:0.55; cursor:wait; }

        /* DEBUG — hidden unless error */
        #debugPanel {
            position:absolute; bottom:0; left:0; right:0; z-index:200;
            background:rgba(0,0,0,0.96); border-top:3px solid var(--yellow);
            padding:10px 14px; display:none; flex-direction:column; gap:6px;
            max-height:50%;
        }
        #debugPanel.show { display:flex; }
        #debugTitle { font-size:8px; letter-spacing:2px; color:var(--yellow); }
        #debugLog { font-family:monospace; font-size:11px; color:#aaffaa; line-height:1.8; overflow-y:auto; max-height:150px; }
        #debugLog .err  { color:#ff6666; }
        #debugLog .warn { color:#ffcc00; }
        #debugClose { font-family:monospace; font-size:10px; color:rgba(255,255,255,0.4); cursor:pointer; align-self:flex-end; }
    </style>
</head>
<body>

<video id="rawVideo" autoplay playsinline muted></video>
<canvas id="thermalCanvas"></canvas>
<div id="vignette"></div>
<div id="flashOverlay"></div>

<div id="hudBar">
    <div class="hud-left">
        <div id="liveDot"></div>
        <span class="hud-label">THERMAL IR</span>
    </div>
    <span id="clockVal">00:00:00</span>
</div>

<div id="tempScale"></div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────
let useFrontCamera = true;
let flashOn        = false;
const PIXEL_BLOCK  = 2;   // small = smooth blobs like reference (not chunky)
const CONTRAST     = 1.2; // gentle — reference is not over-saturated

// ── LUT — matches reference: dark=deep blue/purple, mid=cyan→orange, hot=red→white ──
const LUT_STOPS = [
    [  0, [ 10,   0,  40]],   // near-black deep purple
    [ 35, [  0,   5, 160]],   // deep blue
    [ 70, [  0, 100, 220]],   // bright blue
    [105, [  0, 200, 200]],   // cyan (reference has lots of this)
    [138, [  0, 220, 100]],   // cyan-green bridge
    [160, [255, 200,   0]],   // warm yellow-orange
    [195, [255,  80,   0]],   // orange-red
    [225, [255,   0,  60]],   // vivid red
    [255, [255, 255, 255]],   // white-hot
];

function buildLUT() {
    const lut = new Uint8ClampedArray(256 * 3);
    for (let i = 0; i < 256; i++) {
        let lo = LUT_STOPS[0], hi = LUT_STOPS[LUT_STOPS.length-1];
        for (let s = 0; s < LUT_STOPS.length-1; s++) {
            if (i >= LUT_STOPS[s][0] && i <= LUT_STOPS[s+1][0]) { lo=LUT_STOPS[s]; hi=LUT_STOPS[s+1]; break; }
        }
        const t = lo[0]===hi[0] ? 0 : (i-lo[0])/(hi[0]-lo[0]);
        const lerp = (a,b) => Math.round(a+(b-a)*t);
        lut[i*3]   = lerp(lo[1][0],hi[1][0]);
        lut[i*3+1] = lerp(lo[1][1],hi[1][1]);
        lut[i*3+2] = lerp(lo[1][2],hi[1][2]);
    }
    return lut;
}
const LUT = buildLUT();

// ── ELEMENTS ──────────────────────────────────────────────────────────────
const video     = document.getElementById("rawVideo");
const canvas    = document.getElementById("thermalCanvas");
const ctx       = canvas.getContext("2d", { willReadFrequently: true });
const offCanvas = document.createElement("canvas");
const offCtx    = offCanvas.getContext("2d", { willReadFrequently: true });
let   stream    = null;

function resizeCanvas() { canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

// ── DEBUG (only on error) ─────────────────────────────────────────────────
function dbgErr(msg, type) {
    const panel = document.getElementById("debugPanel");
    const log   = document.getElementById("debugLog");
    panel.classList.add("show");
    const line = document.createElement("div");
    line.className = type || "err";
    line.textContent = "> " + msg;
    log.appendChild(line);
    log.scrollTop = log.scrollHeight;
    console.error("[ERR]", msg);
}

// ── CAMERA START ──────────────────────────────────────────────────────────
function startCamera(front) {
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }

    if (location.protocol !== "https:" && location.hostname !== "localhost" && location.hostname !== "127.0.0.1") {
        dbgErr("Not on HTTPS — camera blocked. Host on GitHub Pages.", "err");
        return;
    }
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        dbgErr("getUserMedia not supported on this browser.", "err");
        return;
    }

    navigator.mediaDevices.getUserMedia({
        video: {
            facingMode: front ? "user" : "environment",
            width:  { ideal: 1280 },
            height: { ideal: 720 }
        },
        audio: false
    })
    .then(function(s) {
        stream = s;
        video.srcObject = s;
        video.addEventListener("loadedmetadata", function() {
            video.play().then(function() {
                document.getElementById("permScreen").style.display = "none";
                requestAnimationFrame(renderFrame);
            }).catch(function(e) { dbgErr("play() failed: " + e.name); });
        }, { once: true });
    })
    .catch(function(err) {
        dbgErr("Camera error: " + err.name + " — " + err.message);
        const btn = document.getElementById("startBtn");
        if (btn) { btn.innerHTML = "&#9654; ACTIVATE"; btn.disabled = false; }
        if (err.name === "NotAllowedError") dbgErr("Go to Settings > Safari > Camera > Allow", "warn");
        if (err.name === "NotSupportedError" || err.name === "SecurityError") dbgErr("Must be HTTPS", "warn");
    });
}

// ── ACTIVATE BUTTON ───────────────────────────────────────────────────────
document.getElementById("startBtn").addEventListener("click", function() {
    this.textContent = "LOADING...";
    this.disabled = true;
    startCamera(useFrontCamera);
});

// ── FLIP CAMERA ───────────────────────────────────────────────────────────
document.getElementById("flipBtn").addEventListener("click", function() {
    useFrontCamera = !useFrontCamera;
    startCamera(useFrontCamera);
});

// ── FLASH TOGGLE ──────────────────────────────────────────────────────────
const flashBtn = document.getElementById("flashBtn");
flashBtn.addEventListener("click", function() {
    flashOn = !flashOn;
    flashBtn.style.borderColor = flashOn ? "var(--yellow)" : "rgba(255,255,255,0.15)";
    flashBtn.style.background  = flashOn ? "rgba(245,200,0,0.2)" : "rgba(30,30,40,0.9)";

    // Try torch on rear camera
    if (stream) {
        const track = stream.getVideoTracks()[0];
        if (track && track.getCapabilities && track.getCapabilities().torch) {
            track.applyConstraints({ advanced: [{ torch: flashOn }] }).catch(() => {});
        }
    }
});

// ── SHUTTER / SCREENSHOT ──────────────────────────────────────────────────
document.getElementById("shutterBtn").addEventListener("click", function() {
    // Flash white overlay
    const overlay = document.getElementById("flashOverlay");
    overlay.style.opacity = "1";
    setTimeout(() => { overlay.style.opacity = "0"; }, 120);

    // Capture current canvas as download
    const link = document.createElement("a");
    link.download = "DOSTI_MACHINE_thermal.jpg";
    link.href = canvas.toDataURL("image/jpeg", 0.92);
    link.click();
});

// ── RENDER LOOP ───────────────────────────────────────────────────────────
function renderFrame() {
    if (video.readyState < 2) { requestAnimationFrame(renderFrame); return; }
    const vw=video.videoWidth, vh=video.videoHeight;
    if (!vw||!vh) { requestAnimationFrame(renderFrame); return; }

    // Render at native res / PIXEL_BLOCK for smooth blobs
    const lowW = Math.ceil(vw / PIXEL_BLOCK);
    const lowH = Math.ceil(vh / PIXEL_BLOCK);
    offCanvas.width  = lowW;
    offCanvas.height = lowH;

    if (useFrontCamera) { offCtx.save(); offCtx.translate(lowW,0); offCtx.scale(-1,1); }
    offCtx.drawImage(video, 0, 0, lowW, lowH);
    if (useFrontCamera) offCtx.restore();

    const imgData = offCtx.getImageData(0,0,lowW,lowH);
    const data    = imgData.data;

    for (let i=0; i<data.length; i+=4) {
        let lum = 0.299*data[i] + 0.587*data[i+1] + 0.114*data[i+2];
        lum = 128 + (lum-128) * CONTRAST;
        lum = Math.max(0, Math.min(255, lum));
        const idx = Math.round(lum)*3;
        data[i]   = LUT[idx];
        data[i+1] = LUT[idx+1];
        data[i+2] = LUT[idx+2];
    }
    offCtx.putImageData(imgData, 0, 0);

    // Upscale with smoothing ON for soft blobs
    ctx.imageSmoothingEnabled  = true;
    ctx.imageSmoothingQuality  = "high";
    ctx.drawImage(offCanvas, 0, 0, canvas.width, canvas.height);

    requestAnimationFrame(renderFrame);
}

// ── CLOCK ─────────────────────────────────────────────────────────────────
function tick() {
    const n=new Date();
    document.getElementById("clockVal").textContent=
        [n.getHours(),n.getMinutes(),n.getSeconds()].map(v=>String(v).padStart(2,"0")).join(":");
}
setInterval(tick,1000); tick();
</script>
