<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DOSTI_MACHINE</title>
<link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
:root{--red:#E8003A;--yellow:#F5C800;--black:#0D0D0D;--white:#FFFFFF;--green:#00FF50}
*{margin:0;padding:0;box-sizing:border-box}
body,html{width:100%;height:100%;overflow:hidden;background:#000;font-family:"Russo One",sans-serif}
#rawVideo{position:absolute;visibility:hidden;width:1px;height:1px}
#thermalCanvas{position:absolute;top:0;left:0;width:100%;height:100%}
#overlayCanvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5}
#vignette{position:absolute;inset:0;pointer-events:none;z-index:6;
  background:radial-gradient(ellipse at center,transparent 48%,rgba(0,0,0,0.7) 100%)}
#flashOverlay{position:absolute;inset:0;z-index:50;background:#fff;opacity:0;pointer-events:none;transition:opacity 0.06s}

/* grain canvas */
#grainCanvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:7;opacity:0;transition:opacity 0.3s}
#grainCanvas.on{opacity:1}

/* scanlines */
#scanlines{position:absolute;inset:0;pointer-events:none;z-index:8;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.11) 3px,rgba(0,0,0,0.11) 4px);
  opacity:0;transition:opacity 0.3s}
#scanlines.on{opacity:1}

/* Encoding overlay */
#encodeOverlay{position:absolute;inset:0;z-index:80;background:rgba(0,0,0,0.92);
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:18px}
#encodeOverlay.show{display:flex}
#encodeDot{width:10px;height:10px;background:var(--red);border-radius:50%;animation:blink 0.5s steps(1) infinite}
#encodeText{font-size:10px;letter-spacing:3px;color:var(--yellow);animation:encPulse 1.1s ease-in-out infinite}
@keyframes encPulse{0%,100%{opacity:1}50%{opacity:0.35}}
#encodeBar{width:220px;height:3px;background:rgba(255,255,255,0.08);overflow:hidden;position:relative}
#encodeBar::after{content:"";position:absolute;top:0;left:-60%;width:60%;height:100%;
  background:linear-gradient(to right,transparent,var(--yellow),transparent);
  animation:sweep 1.1s ease-in-out infinite}
@keyframes sweep{0%{left:-60%}100%{left:120%}}

/* REC */
#recIndicator{position:absolute;top:52px;left:50%;transform:translateX(-50%);
  z-index:10;display:none;align-items:center;gap:6px;background:rgba(10,10,15,0.75);padding:4px 12px}
#recIndicator.show{display:flex}
#recDot{width:8px;height:8px;background:var(--red);animation:blink 0.8s steps(1) infinite}
#recTime{font-size:10px;letter-spacing:2px;color:var(--white)}

/* HUD */
#hudBar{position:absolute;top:0;left:0;right:0;height:42px;z-index:10;
  pointer-events:none;display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;background:rgba(10,10,15,0.85);border-bottom:3px solid var(--red)}
.hud-left{display:flex;align-items:center;gap:8px}
#liveDot{width:8px;height:8px;background:var(--red);animation:blink 1s steps(1) infinite}
@keyframes blink{50%{opacity:0}}
#paletteName{font-size:10px;letter-spacing:2px;color:var(--yellow)}
#clockVal{font-size:10px;letter-spacing:2px;color:rgba(255,255,255,0.5)}

/* Watermark — logo only, no text */
#watermark{position:absolute;bottom:92px;left:50%;transform:translateX(-50%);
  z-index:10;pointer-events:none;display:flex;align-items:center;justify-content:center}
#watermark img{width:62px;
  filter:drop-shadow(0 2px 6px rgba(0,0,0,0.95)) drop-shadow(0 0 10px rgba(232,0,58,0.35));
  opacity:0.82}

/* Controls */
#controls{position:absolute;bottom:0;left:0;right:0;height:84px;z-index:10;
  display:flex;align-items:center;justify-content:center;
  background:rgba(10,10,15,0.88);border-top:3px solid var(--red)}
.side-btns{display:flex;align-items:center;gap:10px;flex:1;justify-content:center}
#centerBtns{display:flex;align-items:center;gap:14px;flex:0 0 auto}
.ctrl-btn{width:48px;height:48px;background:rgba(25,25,35,0.95);
  border:2px solid rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:background 0.12s,border-color 0.12s;
  -webkit-tap-highlight-color:transparent;user-select:none;border-radius:4px}
.ctrl-btn:active{background:rgba(232,0,58,0.22);border-color:var(--red)}
.ctrl-btn.active{border-color:var(--green)!important;background:rgba(0,255,80,0.13)!important}
#shutterBtn{width:68px;height:68px;border-radius:50%;border:3px solid rgba(255,255,255,0.25);background:rgba(25,25,35,0.95)}
#shutterBtn:active{background:rgba(255,255,255,0.15);border-color:var(--white)}
#videoBtn{width:68px;height:68px;border-radius:50%;border:3px solid rgba(232,0,58,0.45);background:rgba(25,25,35,0.95)}
#videoBtn.recording{border-color:var(--red);background:rgba(232,0,58,0.18);animation:recPulse 1s ease-in-out infinite}
@keyframes recPulse{0%,100%{box-shadow:0 0 0 0 rgba(232,0,58,0.4)}50%{box-shadow:0 0 0 8px rgba(232,0,58,0)}}
#flashToggleBtn.flash-on{border-color:var(--yellow);background:rgba(245,200,0,0.18)}

/* SPLASH */
#permScreen{position:absolute;inset:0;z-index:100;background:#05010F;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;overflow:hidden}
#permScreen::before{content:"";position:absolute;inset:0;
  background-image:linear-gradient(rgba(232,0,58,0.14) 1px,transparent 1px),
    linear-gradient(90deg,rgba(232,0,58,0.14) 1px,transparent 1px);
  background-size:32px 32px;
  mask-image:radial-gradient(ellipse at 50% 120%,black 30%,transparent 70%);
  -webkit-mask-image:radial-gradient(ellipse at 50% 120%,black 30%,transparent 70%)}
#permScreen::after{content:"";position:absolute;width:280px;height:280px;border-radius:50%;
  background:radial-gradient(circle,rgba(232,0,58,0.22) 0%,rgba(245,200,0,0.08) 40%,transparent 70%);
  top:50%;left:50%;transform:translate(-50%,-62%);animation:orbPulse 3s ease-in-out infinite}
@keyframes orbPulse{0%,100%{opacity:0.7;transform:translate(-50%,-62%) scale(1)}50%{opacity:1;transform:translate(-50%,-62%) scale(1.08)}}
.splash-logo{position:relative;z-index:2}
.splash-logo img{width:120px;
  filter:drop-shadow(0 0 12px rgba(232,0,58,0.9)) drop-shadow(0 0 28px rgba(245,200,0,0.5));
  animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.splash-title{position:relative;z-index:2;font-family:'Press Start 2P',cursive;
  font-size:17px;line-height:1.8;text-align:center;color:var(--white);
  text-shadow:0 0 10px rgba(232,0,58,1),0 0 28px rgba(232,0,58,0.7),0 0 55px rgba(245,200,0,0.4);
  letter-spacing:1px}
.splash-line{position:relative;z-index:2;width:200px;height:2px;
  background:linear-gradient(to right,transparent,var(--red),var(--yellow),var(--red),transparent);
  box-shadow:0 0 10px var(--red)}
.splash-sub{position:relative;z-index:2;font-size:7px;letter-spacing:2px;
  color:rgba(255,255,255,0.38);text-align:center;line-height:2}
#startBtn{position:relative;z-index:2;padding:15px 40px;background:transparent;
  border:2px solid var(--red);color:var(--white);
  font-family:"Russo One",sans-serif;font-size:13px;letter-spacing:4px;cursor:pointer;
  box-shadow:0 0 12px rgba(232,0,58,0.55),inset 0 0 12px rgba(232,0,58,0.08);
  transition:all 0.15s;-webkit-tap-highlight-color:transparent}
#startBtn:active{background:rgba(232,0,58,0.18);box-shadow:0 0 24px rgba(232,0,58,0.9)}
#startBtn:disabled{opacity:0.42;cursor:wait}
.splash-beam{position:absolute;z-index:1;left:0;right:0;height:2px;
  background:linear-gradient(to right,transparent,rgba(232,0,58,0.38),transparent);
  animation:beam 4s linear infinite}
@keyframes beam{0%{top:-2px}100%{top:100%}}
</style>
</head>
<body>

<video id="rawVideo" autoplay playsinline muted></video>
<canvas id="thermalCanvas"></canvas>
<canvas id="overlayCanvas"></canvas>
<canvas id="grainCanvas" class="on"></canvas>
<div id="scanlines" class="on"></div>
<div id="vignette"></div>
<div id="flashOverlay"></div>

<div id="encodeOverlay">
  <div id="encodeDot"></div>
  <div id="encodeText">ENCODING MP4…</div>
  <div id="encodeBar"></div>
</div>

<div id="hudBar">
  <div class="hud-left">
    <div id="liveDot"></div>
    <span id="paletteName">HEATWAVE</span>
  </div>
  <span id="clockVal">00:00:00</span>
</div>

<div id="recIndicator">
  <div id="recDot"></div>
  <span id="recTime">00:00</span>
</div>

// ── FAKE TRACKER ─────────────────────────────────────────────────────────
// Autonomous scan boxes that drift convincingly
const trackerBoxes = [];
function initTrackerBoxes(cw, ch) {
  trackerBoxes.length = 0;
  const count = 3 + Math.floor(Math.random() * 2);
  for (let i = 0; i < count; i++) {
    trackerBoxes.push({
      x: Math.random() * (cw * 0.7) + cw * 0.05,
      y: Math.random() * (ch * 0.55) + ch * 0.1,
      w: 60 + Math.random() * 90,
      h: 50 + Math.random() * 80,
      vx: (Math.random() - 0.5) * 0.7,
      vy: (Math.random() - 0.5) * 0.5,
      label: ['PERSON','OBJECT','TARGET','BODY','MOTION'][Math.floor(Math.random()*5)],
      conf: 0.72 + Math.random() * 0.25,
      phase: Math.random() * Math.PI * 2,
      lockFrames: 0,
    });
  }
}

function tickTrackerBoxes(cw, ch) {
  for (const b of trackerBoxes) {
    b.phase += 0.04;
    // random micro-drift to look alive
    if (Math.random() < 0.02) b.vx += (Math.random() - 0.5) * 0.4;
    if (Math.random() < 0.02) b.vy += (Math.random() - 0.5) * 0.3;
    b.vx *= 0.98; b.vy *= 0.98;
    b.x += b.vx; b.y += b.vy;
    // clamp
    if (b.x < 10) { b.x = 10; b.vx *= -1; }
    if (b.y < 50) { b.y = 50; b.vy *= -1; }
    if (b.x + b.w > cw - 10) { b.x = cw - 10 - b.w; b.vx *= -1; }
    if (b.y + b.h > ch - 100) { b.y = ch - 100 - b.h; b.vy *= -1; }
    b.lockFrames = Math.max(0, b.lockFrames - 1);
  }
}

function drawTracker(octx, cw, ch) {
  if (!trackerOn) return;
  tickTrackerBoxes(cw, ch);
  octx.clearRect(0, 0, cw, ch);

  // global scan line sweep
  const scanY = ((Date.now() / 12) % ch);
  const grd = octx.createLinearGradient(0, scanY - 40, 0, scanY + 40);
  grd.addColorStop(0, 'rgba(0,255,80,0)');
  grd.addColorStop(0.5, 'rgba(0,255,80,0.04)');
  grd.addColorStop(1, 'rgba(0,255,80,0)');
  octx.fillStyle = grd;
  octx.fillRect(0, 0, cw, ch);

  // crosshair center
  octx.strokeStyle = 'rgba(0,255,80,0.18)';
  octx.lineWidth = 1;
  octx.setLineDash([4, 8]);
  octx.beginPath();
  octx.moveTo(cw/2, 0); octx.lineTo(cw/2, ch);
  octx.moveTo(0, ch/2); octx.lineTo(cw, ch/2);
  octx.stroke();
  octx.setLineDash([]);

  for (const b of trackerBoxes) {
    const pulse = 0.5 + 0.5 * Math.sin(b.phase);
    const alpha = 0.55 + 0.3 * pulse;

    // box
    octx.strokeStyle = `rgba(0,255,80,${alpha})`;
    octx.lineWidth = 1.5;
    octx.strokeRect(b.x, b.y, b.w, b.h);

    // corner brackets only
    const cs = 10;
    octx.strokeStyle = `rgba(0,255,80,${alpha + 0.2})`;
    octx.lineWidth = 2.5;
    // TL
    octx.beginPath(); octx.moveTo(b.x, b.y+cs); octx.lineTo(b.x, b.y); octx.lineTo(b.x+cs, b.y); octx.stroke();
    // TR
    octx.beginPath(); octx.moveTo(b.x+b.w-cs, b.y); octx.lineTo(b.x+b.w, b.y); octx.lineTo(b.x+b.w, b.y+cs); octx.stroke();
    // BL
    octx.beginPath(); octx.moveTo(b.x, b.y+b.h-cs); octx.lineTo(b.x, b.y+b.h); octx.lineTo(b.x+cs, b.y+b.h); octx.stroke();
    // BR
    octx.beginPath(); octx.moveTo(b.x+b.w-cs, b.y+b.h); octx.lineTo(b.x+b.w, b.y+b.h); octx.lineTo(b.x+b.w, b.y+b.h-cs); octx.stroke();

    // label
    octx.font = '8px "Russo One", monospace';
    octx.fillStyle = `rgba(0,255,80,${alpha})`;
    octx.fillText(`${b.label}  ${(b.conf * 100).toFixed(0)}%`, b.x + 3, b.y - 4);

    // center dot
    octx.fillStyle = `rgba(0,255,80,${0.6 + 0.4 * pulse})`;
    octx.beginPath();
    octx.arc(b.x + b.w/2, b.y + b.h/2, 2, 0, Math.PI*2);
    octx.fill();
  }

  // HUD overlay text
  octx.font = '7px "Russo One", monospace';
  octx.fillStyle = 'rgba(0,255,80,0.55)';
  octx.fillText('TRACK', 8, ch - 94);
  octx.fillText('ACTIVE', 8, ch - 85);
}

function resizeGrain() {

function renderGrain() {
  const w = grainCanvas.width, h = grainCanvas.height;
  const idata = grainCtx.createImageData(w, h);
  const buf   = idata.data;
  // per-palette grain intensity
  const intensities = [38, 28, 52, 46]; // heatwave, purple haze, fuji, night vision
  const intensity = intensities[currentPalette] || 36;
  for (let i = 0; i < buf.length; i += 4) {
    const v = (Math.random() * 2 - 1) * intensity;
    buf[i]   = 128 + v;
    buf[i+1] = 128 + v;
    buf[i+2] = 128 + v;
    buf[i+3] = 28; // translucent
  }
  grainCtx.putImageData(idata, 0, 0);
  grainAnimFrame = requestAnimationFrame(renderGrain);
}

function buildLUT(stops) {
  const lut = new Uint8ClampedArray(256 * 3);
  for (let i = 0; i < 256; i++) {
    let lo = stops[0], hi = stops[stops.length - 1];
    for (let s = 0; s < stops.length - 1; s++) {
      if (i >= stops[s][0] && i <= stops[s+1][0]) { lo = stops[s]; hi = stops[s+1]; break; }
    }
    const t   = lo[0] === hi[0] ? 0 : (i - lo[0]) / (hi[0] - lo[0]);
    const lrp = (a, b) => Math.round(a + (b - a) * t);
    lut[i*3]   = lrp(lo[1][0], hi[1][0]);
    lut[i*3+1] = lrp(lo[1][1], hi[1][1]);
    lut[i*3+2] = lrp(lo[1][2], hi[1][2]);
  }
  return lut;
}

  tctx.globalAlpha = 0.82;
  if (wmImage.complete && wmImage.naturalWidth > 0) {
    tctx.drawImage(wmImage, x, y, wmW, wmW);
  }
  tctx.restore();
}

// ── CAMERA ────────────────────────────────────────────────────────────────
function setTorch(on) {
  if (!stream) return;
  const track = stream.getVideoTracks()[0];
  if (track && track.getCapabilities && track.getCapabilities().torch) {
    track.applyConstraints({ advanced: [{ torch: on }] }).catch(() => {});
  }
}

function startCamera(front) {
  if (isRecording) stopRecording();
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }

  navigator.mediaDevices.getUserMedia({
    video: { facingMode: front ? 'user' : 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
    audio: true
  }).then(s => {
    stream = s;
    video.srcObject = s;
    video.addEventListener('loadedmetadata', () => {
      video.play().then(() => {
        document.getElementById('permScreen').style.display = 'none';
        if (!front && flashOn) setTorch(true);
        renderFrame();
      }).catch(e => console.error('play failed', e));
    }, { once: true });
  }).catch(err => {
    const btn = document.getElementById('startBtn');
    if (btn) { btn.innerHTML = '&#9654; ACTIVATE'; btn.disabled = false; }
    console.error('Camera error:', err);
  });
}

document.getElementById('startBtn').addEventListener('click', function () {
  this.textContent = 'LOADING…'; this.disabled = true;
  startCamera(useFrontCamera);
});

document.getElementById('flipBtn').addEventListener('click', () => {
  useFrontCamera = !useFrontCamera;
  if (!useFrontCamera && flashOn) {
    // will re-arm torch after camera starts
  } else {
    setTorch(false); // front has no torch
  }
  startCamera(useFrontCamera);
});

document.getElementById('paletteBtn').addEventListener('click', () => {
  applyPalette((currentPalette + 1) % PALETTES.length);
});

document.getElementById('trackerBtn').addEventListener('click', function () {
  trackerOn = !trackerOn;
  this.classList.toggle('active', trackerOn);
  if (trackerOn) initTrackerBoxes(canvas.width, canvas.height);
  else overlayCtx.clearRect(0, 0, overlayC.width, overlayC.height);
});

document.getElementById('flashToggleBtn').addEventListener('click', function () {
  flashOn = !flashOn;
  this.classList.toggle('flash-on', flashOn);
  if (!useFrontCamera) setTorch(flashOn);
});

// ── ASCII RENDERER ────────────────────────────────────────────────────────
function renderAscii(srcCtx, srcW, srcH, destCtx, destW, destH) {
  const COLS = 80;
  const cellW = srcW / COLS;
  const cellH = cellW * 1.9;
  const ROWS  = Math.ceil(srcH / cellH);

  destCtx.fillStyle = '#000';
  destCtx.fillRect(0, 0, destW, destH);

  const srcData = srcCtx.getImageData(0, 0, srcW, srcH).data;
  const fontH   = Math.max(6, Math.round(destH / ROWS));
  const fontW   = fontH * 0.55;
  destCtx.font  = `${fontH}px monospace`;

  for (let row = 0; row < ROWS; row++) {
    for (let col = 0; col < COLS; col++) {
      const px = Math.floor(col * cellW);
      const py = Math.floor(row * cellH);
      const i  = (py * srcW + px) * 4;
      // already palette-mapped, just use green channel as brightness
      const lum = srcData[i+1];
      const charIdx = Math.floor((lum / 255) * (ASCII_CHARS.length - 1));
      const ch  = ASCII_CHARS[charIdx];
      // colour from palette data
      destCtx.fillStyle = `rgb(${srcData[i]},${srcData[i+1]},${srcData[i+2]})`;
      destCtx.fillText(ch, col * fontW, row * fontH + fontH);
    }
  }
}

// ── RENDER LOOP ───────────────────────────────────────────────────────────
function renderFrame() {
  if (video.readyState < 2) { requestAnimationFrame(renderFrame); return; }
  const vw = video.videoWidth, vh = video.videoHeight;
  if (!vw || !vh) { requestAnimationFrame(renderFrame); return; }

  const lowW = Math.ceil(vw / PIXEL_BLOCK);
  const lowH = Math.ceil(vh / PIXEL_BLOCK);
  offCanvas.width  = lowW;
  offCanvas.height = lowH;

  if (useFrontCamera) {
    offCtx.save();
    offCtx.translate(lowW, 0);
    offCtx.scale(-1, 1);
  }
  offCtx.drawImage(video, 0, 0, lowW, lowH);
  if (useFrontCamera) offCtx.restore();

  // palette mapping
  const imgData = offCtx.getImageData(0, 0, lowW, lowH);
  const data    = imgData.data;
  const lut     = LUTS[currentPalette];

  for (let i = 0; i < data.length; i += 4) {
    let lum = 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
    lum = 128 + (lum - 128) * CONTRAST;
    lum = Math.max(0, Math.min(255, lum));
    const idx = Math.round(lum) * 3;
    data[i]   = lut[idx];
    data[i+1] = lut[idx+1];
    data[i+2] = lut[idx+2];
  }
  offCtx.putImageData(imgData, 0, 0);

  ctx.imageSmoothingEnabled  = true;
  ctx.imageSmoothingQuality  = 'high';

  if (asciiMode) {
    renderAscii(offCtx, lowW, lowH, ctx, canvas.width, canvas.height);
  } else {
    ctx.drawImage(offCanvas, 0, 0, canvas.width, canvas.height);
  }

  // tracker overlay
  if (trackerOn) drawTracker(overlayCtx, overlayC.width, overlayC.height);

  requestAnimationFrame(renderFrame);
}

// ── PHOTO CAPTURE ─────────────────────────────────────────────────────────
function doCapture() {
  const overlay = document.getElementById('flashOverlay');
  overlay.style.opacity = '1';
  setTimeout(() => { overlay.style.opacity = '0'; }, 130);

  const saveC  = document.createElement('canvas');
  saveC.width  = canvas.width;
  saveC.height = canvas.height;
  const sCtx   = saveC.getContext('2d');
  sCtx.drawImage(canvas, 0, 0);
  // tracker baked in too
  if (trackerOn) sCtx.drawImage(overlayC, 0, 0);
  drawWatermark(sCtx, saveC.width, saveC.height);

  const link  = document.createElement('a');
  link.download = 'DOSTI_MACHINE.jpg';
  link.href     = saveC.toDataURL('image/jpeg', 0.94);
  link.click();
}
document.getElementById('shutterBtn').addEventListener('click', doCapture);

// ── VIDEO RECORDING + ffmpeg.wasm MP4 ────────────────────────────────────
const { createFFmpeg, fetchFile } = FFmpeg;
let ffmpeg = null;

async function loadFFmpeg() {
  if (ffmpeg && ffmpeg.isLoaded()) return;
  ffmpeg = createFFmpeg({ log: false });
  await ffmpeg.load();
}

function formatTime(s) {
  return String(Math.floor(s / 60)).padStart(2, '0') + ':' + String(s % 60).padStart(2, '0');
}

// composite canvas for recording
const recCanvas = document.createElement('canvas');
const recCtx    = recCanvas.getContext('2d');

function stopRecording() {
  if (!mediaRecorder) return;
  mediaRecorder.stop();
  isRecording = false;
  clearInterval(recInterval);
  recSeconds  = 0;
  document.getElementById('recIndicator').classList.remove('show');
  document.getElementById('videoBtn').classList.remove('recording');
  document.getElementById('videoIcon').innerHTML = `
    <rect x="2" y="8" width="18" height="16" rx="2" fill="white"/>
    <circle cx="11" cy="16" r="5" fill="#111" stroke="white" stroke-width="1"/>
    <circle cx="11" cy="16" r="2.5" fill="#333"/>
    <polygon points="22,11 30,8 30,24 22,21" fill="white"/>`;
}

async function encodeToMP4(chunks, mimeType) {
  document.getElementById('encodeOverlay').classList.add('show');
  try {
    await loadFFmpeg();
    const blob = new Blob(chunks, { type: mimeType });
    const buf  = await blob.arrayBuffer();
    ffmpeg.FS('writeFile', 'input.webm', new Uint8Array(buf));
    await ffmpeg.run('-i', 'input.webm', '-c:v', 'libx264', '-preset', 'ultrafast',
                     '-crf', '23', '-c:a', 'aac', '-b:a', '128k',
                     '-movflags', '+faststart', 'output.mp4');
    const out  = ffmpeg.FS('readFile', 'output.mp4');
    const mp4  = new Blob([out.buffer], { type: 'video/mp4' });
    const url  = URL.createObjectURL(mp4);
    const link = document.createElement('a');
    link.download = 'DOSTI_MACHINE.mp4';
    link.href = url;
    link.click();
    URL.revokeObjectURL(url);
  } catch (e) {
    console.error('ffmpeg encode error', e);
    // fallback: download whatever we have
    const blob = new Blob(chunks, { type: mimeType });
    const url  = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.download = 'DOSTI_MACHINE.webm';
    link.href = url;
    link.click();
    URL.revokeObjectURL(url);
  }
  document.getElementById('encodeOverlay').classList.remove('show');
}

document.getElementById('videoBtn').addEventListener('click', async function () {
  if (!stream) return;
  if (isRecording) { stopRecording(); return; }

  recCanvas.width  = canvas.width;
  recCanvas.height = canvas.height;

  let compositeRunning = true;
  function compositeFrame() {
    if (!compositeRunning) return;
    recCtx.drawImage(canvas, 0, 0);
    if (trackerOn) recCtx.drawImage(overlayC, 0, 0);
    drawWatermark(recCtx, recCanvas.width, recCanvas.height);
    requestAnimationFrame(compositeFrame);
  }
  compositeFrame();

  const recStream = recCanvas.captureStream(30);
  stream.getAudioTracks().forEach(t => recStream.addTrack(t));

  const mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp9')
    ? 'video/webm;codecs=vp9'
    : MediaRecorder.isTypeSupported('video/webm') ? 'video/webm' : 'video/mp4';

  try { mediaRecorder = new MediaRecorder(recStream, { mimeType }); }
  catch (e) { mediaRecorder = new MediaRecorder(recStream); }

  recChunks = [];
  mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recChunks.push(e.data); };
  mediaRecorder.onstop = async () => {
    compositeRunning = false;
    await encodeToMP4(recChunks, mimeType);
  };

  mediaRecorder.start();
  isRecording = true;
  document.getElementById('videoBtn').classList.add('recording');
  document.getElementById('recIndicator').classList.add('show');
  document.getElementById('videoIcon').innerHTML = `<rect x="8" y="8" width="16" height="16" rx="2" fill="#E8003A"/>`;
  recSeconds = 0;
  document.getElementById('recTime').textContent = formatTime(0);
  recInterval = setInterval(() => {
    recSeconds++;
    document.getElementById('recTime').textContent = formatTime(recSeconds);
  }, 1000);
});

// ── CLOCK ─────────────────────────────────────────────────────────────────
function tick() {
  const n = new Date();
  document.getElementById('clockVal').textContent =
    [n.getHours(), n.getMinutes(), n.getSeconds()].map(v => String(v).padStart(2, '0')).join(':');
}
setInterval(tick, 1000); tick();

// ── START GRAIN ───────────────────────────────────────────────────────────
resizeGrain();
renderGrain();
</script>
